                <textarea id="markdown-source" style="display:none;">
来到大学，感觉似乎并没有经历过什么特别让我印象深刻的事情。每天过得平平淡淡，甚至有些无聊。虽然偶尔会有一些小插曲，但总体来说，生活似乎缺乏了些许刺激和挑战。

《桃花幽香》的写作早就已经完成，很多时候都被这个转专业搞的心烦意乱。

### 夜思
昨天晚上躺在床上，无法入眠，脑袋里面不断闪着自己转专业可能遇到的事情。老师拷打，以及别的别的什么的。

我时常思考，为什么会变成这个样子? 转专业本应该是选择自己兴趣爱好的再次一个途径，但现在，却变成了一个充满不确定性和压力的过程。

我们只看到了那些成功的人，但是，我突然想到，那些失败了的同学们呢？他们的付出和努力真的就是一文不值了吗？

我甚至在想，如果我在去面试的路上被一辆车撞飞，我拖着流血的身体，骨头从大腿刺出，坚持着面试完，能不能打动老师，给我多一点点的机会？

前两天到光彪楼上了自习，我发现我真的喜欢那个地方，氛围很好，条件也很好。

### Ich hätte das Dunkel ertragen können, hätte ich nicht das Licht gesehen.
这句话的意思是“我本可以忍受黑暗，如果我没有见过光明”。

一开始，我来到大学，感觉偌大的一个学校，似乎没有适合自己的专业，也不存在我能到达的地方，我盲目的学习，为了一个转专业的空头支票付出着自己的一切。

我永远会在相同的时间，出现在相同的地点，而很大概率，我还会做着一样的题。

这样的日子，真的是我所期望着的日子吗？

直到我在水源上面要转致远物理的帖子被众人“喷”了个狗血淋头。 大家都开始劝说我，说我适合做点别的，适合学一学CS。

于是我怀着将信将疑的念头和态度，尝试了一下。

我陷进去了。

我发现我已经无法离开这个事情了。

似乎是这么多年的人生里面，我真正的找到了一个同时满足事业和我个人爱好的东西。Recursion、OOP、DFS、BFS、Gitlet...

这些东西能让我沉入其中，让我不知疲惫的学习着。虽然不知道是我真的爱上了这个东西，还是说只是我的功利心再一次发作了。

每每当我写完这些，我会突然感到一阵空虚和失落，因为这并不是我现在实实在在该干的事情。

我是一个医学生。

我是一个临床五年的学生。

我该学习的是解剖、代谢生物化学、内外妇儿等等。

**妈的**

如果我未曾接触过这一切，我定然不会有这么多的想法，我也不会有这么多的纠结。

可是已经晚了，我感觉我自己真的找到了一个我自己该属于的地方。

## 结语
今天，又在C200待了一整个日子。

没有说一句话，只是写着GitLet,学了一点点算法。

昨天夜里给我的那种失落感实在是太强了，我还没能完完全全的从里面逃脱出来。

休息了一会，感觉到自己的注意力涣散，所以我还是干了这个我一直想干的事情。

我搭了这个博客，似乎这样可以让我和那些码类的学生们更相似一样。

希望，我能不仅仅是和他们相似吧。

    <script>
        const markdownSource = document.getElementById('markdown-source').value;
        document.getElementById('markdown-output').innerHTML = marked.parse(markdownSource);

        function createSakura() {
            const petal = document.createElement('div');
            petal.className = 'sakura-petal';
            const size = Math.random() * 10 + 10;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.left = Math.random() * window.innerWidth + 'px';
            const fallDuration = Math.random() * 4 + 4;
            petal.style.animationDuration = fallDuration + 's';
            document.body.appendChild(petal);
            setTimeout(() => { petal.remove(); }, fallDuration * 1000);
        }
        setInterval(createSakura, 400);

        // 4. 补入打字机特效脚本
        const textToType = "OOP爱好者 Markdown迷 LaTeX享受者 OI受害者...";
        const typingElement = document.getElementById('typing-text');
        let typeIndex = 0;
        function typeWriter() {
            if (typingElement && typeIndex < textToType.length) {
                typingElement.innerHTML = textToType.substring(0, typeIndex + 1) + '<span class="animate-pulse font-bold text-red-500">_</span>';
                typeIndex++;
                setTimeout(typeWriter, Math.random() * 100 + 50); 
            } else if (typingElement) {
                typingElement.innerHTML = textToType + '<span class="animate-pulse font-bold text-red-500">_</span>';
            }
        }
        setTimeout(typeWriter, 800);

        // 5. 补入高级双缓冲壁纸轮播脚本
        const backgrounds = [
            'images/bg1.png',
            'images/bg2.jpg',
            'images/bg3.png'
        ];
        
        const bgA = document.getElementById('bg-a');
        const bgB = document.getElementById('bg-b');
        let currentBgIndex = 0;
        let activeLayer = 'A'; 

        function changeBackground() {
            if (!bgA || !bgB) return;

            currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
            const fullStyle = `linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('${backgrounds[currentBgIndex]}')`;

            if (activeLayer === 'A') {
                bgB.style.backgroundImage = fullStyle;
                bgB.style.opacity = '1';
                bgA.style.opacity = '0';
                activeLayer = 'B';
            } else {
                bgA.style.backgroundImage = fullStyle;
                bgA.style.opacity = '1';
                bgB.style.opacity = '0';
                activeLayer = 'A';
            }
        }
        setInterval(changeBackground, 10000);

        // 🎵 4. 音乐播放器交互逻辑
        const musicToggle = document.getElementById('music-toggle');
        const bgmPlayer = document.getElementById('bgm-player');
        const musicDisc = document.getElementById('music-disc');
        let isPlaying = false;

        // 初始状态下暂停光盘旋转
        musicDisc.style.animationPlayState = 'paused';

        musicToggle.addEventListener('click', () => {
            if (isPlaying) {
                bgmPlayer.pause();
                musicDisc.style.animationPlayState = 'paused'; // 停止旋转
                isPlaying = false;
            } else {
                bgmPlayer.play();
                musicDisc.style.animationPlayState = 'running'; // 开始旋转
                isPlaying = true;
            }
        });

        // 🎵 5. 跨页面音乐状态继承 (SessionStorage 魔法)
        
        // 1. 页面即将销毁前：保存当前的播放进度和状态
        window.addEventListener('beforeunload', () => {
            if (typeof bgmPlayer !== 'undefined' && bgmPlayer) {
                sessionStorage.setItem('bgmTime', bgmPlayer.currentTime);
                sessionStorage.setItem('bgmPlaying', isPlaying);
            }
        });

        // 2. 新页面加载完成后：立刻读取记忆并恢复
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof bgmPlayer !== 'undefined' && bgmPlayer) {
                const savedTime = sessionStorage.getItem('bgmTime');
                const wasPlaying = sessionStorage.getItem('bgmPlaying') === 'true';
                
                // 恢复进度条
                if (savedTime) {
                    bgmPlayer.currentTime = parseFloat(savedTime);
                }
                
                // 如果上个页面在播放，则尝试接力播放
                if (wasPlaying) {
                    // 使用 Promise 捕获浏览器的自动播放限制
                    bgmPlayer.play().then(() => {
                        musicDisc.style.animationPlayState = 'running';
                        isPlaying = true;
                    }).catch((error) => {
                        console.warn('【极客提示】现代浏览器拦截了跨页面的自动播放，需要用户再次手动点击播放按钮。', error);
                        musicDisc.style.animationPlayState = 'paused';
                        isPlaying = false;
                    });
                }
            }
        });
    </script>
